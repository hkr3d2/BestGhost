name: Build Geode Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Geode CLI
      run: |
        curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-cli.exe -o geode.exe
        echo "${{ github.workspace }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Install Geode SDK
      run: geode.exe sdk install 5.5.3
    
    - name: Install dependencies
      run: geode.exe install
	
    - name: Build mod
      run: geode.exe build
	
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BestGhost-Geode-Mod
        path: build/*.geode
